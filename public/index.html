<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5净化大师 - 去版权/去广告/去尾页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        .content { padding: 40px; }
        .url-input {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .url-input input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .url-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 10px 20px;
            border-radius: 10px;
        }
        .option input { width: 20px; height: 20px; cursor: pointer; }
        .option label { cursor: pointer; font-weight: 500; }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            flex: 1;
        }
        button:hover { transform: translateY(-2px); }
        .btn-copy {
            background: #28a745;
        }
        .btn-reset {
            background: #6c757d;
        }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
            background: #f9f9f9;
            border-radius: 10px;
            margin-top: 20px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .result-area {
            margin-top: 30px;
            display: none;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preview-title {
            font-weight: bold;
            color: #333;
        }
        .source-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .info {
            background: #e7f3ff;
            color: #004085;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            background: #e9ecef;
            color: #495057;
            padding: 8px 20px;
            font-size: 0.9rem;
            margin: 0;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .content { padding: 20px; }
            .url-input { flex-direction: column; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧹 H5净化大师</h1>
        <p>一键去除网页广告 · 版权声明 · 尾部导航</p>
    </div>
    <div class="content">
        <div class="url-input">
            <input type="text" id="url" placeholder="请输入要净化的网页地址，例如：https://example.com/article" />
        </div>
        
        <div class="options">
            <div class="option">
                <input type="checkbox" id="removeAds" checked />
                <label>去除广告</label>
            </div>
            <div class="option">
                <input type="checkbox" id="removeCopyright" checked />
                <label>去除版权声明</label>
            </div>
            <div class="option">
                <input type="checkbox" id="removeFooter" checked />
                <label>去除尾页/页脚</label>
            </div>
        </div>
        
        <div class="btn-group">
            <button id="cleanBtn">✨ 开始净化</button>
            <button id="resetBtn" class="btn-reset">🔄 重置</button>
        </div>
        
        <div class="loading" id="loading">
            <div>⏳ 正在处理中，请稍候...</div>
        </div>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        
        <div class="result-area" id="resultArea">
            <div class="preview-header">
                <span class="preview-title" id="previewTitle">净化结果</span>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="preview">🌐 预览网页</button>
                <button class="tab-btn" data-tab="source">📄 查看/复制源码</button>
            </div>
            
            <!-- 预览标签页 -->
            <div class="tab-content active" id="tab-preview">
                <div class="source-box" id="previewInfo" style="background:#f5f5f5; color:#666; text-align:center;">
                    ⚠️ 由于目标网站的安全限制，可能无法在此处直接预览。<br>
                    请点击「查看/复制源码」标签页，复制代码后保存为 .html 文件查看。
                </div>
            </div>
            
            <!-- 源码标签页 -->
            <div class="tab-content" id="tab-source">
                <div style="margin-bottom: 10px; display: flex; gap: 10px;">
                    <button id="copySourceBtn" class="btn-copy" style="padding: 8px 20px;">📋 一键复制源码</button>
                    <button id="downloadSourceBtn" style="background: #007bff; padding: 8px 20px;">💾 下载为 HTML 文件</button>
                </div>
                <div class="source-box" id="sourceCode">暂无内容，请先净化一个网页</div>
            </div>
        </div>
        
        <div class="info">
            💡 提示：由于目标网站的安全限制，请使用「查看/复制源码」功能，<br>
            复制代码后保存为 .html 文件，双击即可用浏览器打开查看完整效果。
        </div>
    </div>
</div>

<script>
    const apiUrl = window.location.origin + '/api/clean';
    let currentCleanedHtml = '';
    let currentTitle = '';
    
    // Tab 切换功能
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        });
    });
    
    document.getElementById('cleanBtn').addEventListener('click', async () => {
        const url = document.getElementById('url').value.trim();
        if (!url) {
            alert('请输入网页地址');
            return;
        }
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('success').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: url,
                    removeAds: document.getElementById('removeAds').checked,
                    removeCopyright: document.getElementById('removeCopyright').checked,
                    removeFooter: document.getElementById('removeFooter').checked
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentCleanedHtml = data.cleanedHtml;
                currentTitle = data.title || '净化后的网页';
                
                document.getElementById('previewTitle').innerHTML = `✅ 净化成功：${currentTitle}`;
                document.getElementById('sourceCode').innerHTML = escapeHtml(currentCleanedHtml);
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('success').innerHTML = `✅ 净化成功！共移除广告/版权/尾页相关内容。`;
                document.getElementById('success').style.display = 'block';
                
                // 尝试在预览区用 iframe 显示（可能会被限制，没关系）
                const previewDiv = document.getElementById('tab-preview');
                previewDiv.innerHTML = `<iframe srcdoc="${escapeHtml(currentCleanedHtml)}" style="width:100%; height:400px; border:1px solid #ddd; border-radius:8px;"></iframe>
                <div style="background:#f5f5f5; color:#666; text-align:center; padding:10px; margin-top:10px; border-radius:8px;">
                    ⚠️ 部分网站可能限制被嵌入显示，请使用「查看/复制源码」保存到本地查看。
                </div>`;
                
            } else {
                showError(data.error);
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });
    
    // 复制源码按钮
    document.getElementById('copySourceBtn').addEventListener('click', async () => {
        if (!currentCleanedHtml) {
            alert('暂无内容，请先净化一个网页');
            return;
        }
        
        try {
            await navigator.clipboard.writeText(currentCleanedHtml);
            alert('✅ 源码已复制到剪贴板！\n\n你可以粘贴到一个新建的 .html 文件中，双击用浏览器打开。');
        } catch (err) {
            alert('复制失败，你可以手动选择代码复制');
        }
    });
    
    // 下载为 HTML 文件
    document.getElementById('downloadSourceBtn').addEventListener('click', () => {
        if (!currentCleanedHtml) {
            alert('暂无内容，请先净化一个网页');
            return;
        }
        
        const blob = new Blob([currentCleanedHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `purified_${Date.now()}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert('✅ 文件下载成功！双击打开即可查看净化后的网页。');
    });
    
    // 重置按钮
    document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('url').value = '';
        document.getElementById('removeAds').checked = true;
        document.getElementById('removeCopyright').checked = true;
        document.getElementById('removeFooter').checked = true;
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('error').style.display = 'none';
        document.getElementById('success').style.display = 'none';
        currentCleanedHtml = '';
    });
    
    function showError(msg) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `❌ ${msg}`;
        errorDiv.style.display = 'block';
    }
    
    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
