<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5净化大师 - 去版权/去广告/去尾页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        .content { padding: 40px; }
        .url-input {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .url-input input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .url-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 10px 20px;
            border-radius: 10px;
        }
        .option input { width: 20px; height: 20px; cursor: pointer; }
        .option label { cursor: pointer; font-weight: 500; }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            flex: 1;
        }
        button:hover { transform: translateY(-2px); }
        .btn-outline {
            background: #6c757d;
        }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
            background: #f9f9f9;
            border-radius: 10px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .result-area {
            margin-top: 30px;
            display: none;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preview-title {
            font-weight: bold;
            color: #333;
        }
        .preview-frame {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }
        .preview-frame iframe {
            width: 100%;
            height: 500px;
            border: none;
        }
        .source-btn {
            background: #28a745;
            padding: 8px 20px;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .content { padding: 20px; }
            .url-input { flex-direction: column; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧹 H5净化大师</h1>
        <p>一键去除网页广告 · 版权声明 · 尾部导航</p>
    </div>
    <div class="content">
        <div class="url-input">
            <input type="text" id="url" placeholder="请输入要净化的网页地址，例如：https://example.com/article" />
        </div>
        
        <div class="options">
            <div class="option">
                <input type="checkbox" id="removeAds" checked />
                <label>去除广告</label>
            </div>
            <div class="option">
                <input type="checkbox" id="removeCopyright" checked />
                <label>去除版权声明</label>
            </div>
            <div class="option">
                <input type="checkbox" id="removeFooter" checked />
                <label>去除尾页/页脚</label>
            </div>
        </div>
        
        <div class="btn-group">
            <button id="cleanBtn">✨ 开始净化并预览</button>
            <button id="resetBtn" class="btn-outline">🔄 重置</button>
        </div>
        
        <div class="loading" id="loading">
            <div>⏳ 正在处理中，请稍候...</div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result-area" id="resultArea">
            <div class="preview-header">
                <span class="preview-title" id="previewTitle">净化结果预览</span>
                <button id="viewSourceBtn" class="source-btn">📄 查看源码</button>
            </div>
            <div class="preview-frame">
                <iframe id="resultFrame" srcdoc="<html><body style='background:#f5f5f5;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;color:#666;'>✨ 点击「开始净化」查看结果</body></html>"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    const apiUrl = window.location.origin + '/api/clean';
    let currentCleanedHtml = '';
    
    document.getElementById('cleanBtn').addEventListener('click', async () => {
        const url = document.getElementById('url').value.trim();
        if (!url) {
            alert('请输入网页地址');
            return;
        }
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: url,
                    removeAds: document.getElementById('removeAds').checked,
                    removeCopyright: document.getElementById('removeCopyright').checked,
                    removeFooter: document.getElementById('removeFooter').checked
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentCleanedHtml = data.cleanedHtml;
                const title = data.title || '净化后的网页';
                document.getElementById('previewTitle').innerHTML = `✅ 净化成功：${title}`;
                
                // 在 iframe 中显示净化后的网页
                const iframe = document.getElementById('resultFrame');
                iframe.srcdoc = currentCleanedHtml;
                
                document.getElementById('resultArea').style.display = 'block';
            } else {
                showError(data.error);
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });
    
    // 重置按钮
    document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('url').value = '';
        document.getElementById('removeAds').checked = true;
        document.getElementById('removeCopyright').checked = true;
        document.getElementById('removeFooter').checked = true;
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('error').style.display = 'none';
        const iframe = document.getElementById('resultFrame');
        iframe.srcdoc = "<html><body style='background:#f5f5f5;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;color:#666;'>✨ 点击「开始净化」查看结果</body></html>";
    });
    
    // 查看源码按钮
    document.getElementById('viewSourceBtn').addEventListener('click', () => {
        if (currentCleanedHtml) {
            const win = window.open();
            win.document.write('<pre style="word-wrap:break-word;white-space:pre-wrap;">' + escapeHtml(currentCleanedHtml) + '</pre>');
            win.document.close();
        } else {
            alert('暂无内容，请先净化一个网页');
        }
    });
    
    function showError(msg) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `❌ ${msg}`;
        errorDiv.style.display = 'block';
    }
    
    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
