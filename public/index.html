<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5净化大师 - 去版权/去广告/去尾页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        .content { padding: 40px; }
        .url-input {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .url-input input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .url-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 10px 20px;
            border-radius: 10px;
        }
        .option input { width: 20px; height: 20px; cursor: pointer; }
        .option label { cursor: pointer; font-weight: 500; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover { transform: translateY(-2px); }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
            background: #f9f9f9;
            border-radius: 10px;
            margin-top: 20px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        .info {
            background: #e7f3ff;
            color: #004085;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .content { padding: 20px; }
            .url-input { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧹 H5净化大师</h1>
        <p>一键去除网页广告 · 版权声明 · 尾部导航</p>
    </div>
    <div class="content">
        <div class="url-input">
            <input type="text" id="url" placeholder="请输入要净化的网页地址，例如：https://example.com/article" />
        </div>
        
        <div class="options">
            <div class="option">
                <input type="checkbox" id="removeAds" checked />
                <label>去除广告</label>
            </div>
            <div class="option">
                <input type="checkbox" id="removeCopyright" checked />
                <label>去除版权声明</label>
            </div>
            <div class="option">
                <input type="checkbox" id="removeFooter" checked />
                <label>去除尾页/页脚</label>
            </div>
        </div>
        
        <button id="cleanBtn">✨ 开始净化并在新窗口打开</button>
        
        <div class="loading" id="loading">
            <div>⏳ 正在处理中，请稍候...</div>
        </div>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        
        <div class="info">
            💡 提示：点击按钮后，将在新标签页中打开净化后的网页。<br>
            ⚠️ 如果新窗口没有自动打开，请检查浏览器是否拦截了弹窗。
        </div>
    </div>
</div>

<script>
    const apiUrl = window.location.origin + '/api/clean';
    
    document.getElementById('cleanBtn').addEventListener('click', async () => {
        const url = document.getElementById('url').value.trim();
        if (!url) {
            alert('请输入网页地址');
            return;
        }
        
        // 显示加载状态
        document.getElementById('loading').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('success').style.display = 'none';
        
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: url,
                    removeAds: document.getElementById('removeAds').checked,
                    removeCopyright: document.getElementById('removeCopyright').checked,
                    removeFooter: document.getElementById('removeFooter').checked
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                // 方法1：创建 Blob 并打开
                const blob = new Blob([data.cleanedHtml], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                const newWindow = window.open(blobUrl);
                
                if (newWindow) {
                    // 成功打开
                    document.getElementById('success').innerHTML = `✅ 净化成功！已在新窗口打开：${data.title}`;
                    document.getElementById('success').style.display = 'block';
                    // 清理 blob URL
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
                } else {
                    // 被拦截了，给用户提示并提供备选方案
                    document.getElementById('success').innerHTML = `✅ 净化成功！但浏览器拦截了新窗口。<br>
                    请<a href="${blobUrl}" target="_blank" style="color:#155724;">点击这里</a>手动打开，或允许弹窗后重试。`;
                    document.getElementById('success').style.display = 'block';
                }
            } else {
                showError(data.error);
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });
    
    function showError(msg) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `❌ ${msg}`;
        errorDiv.style.display = 'block';
    }
</script>
</body>
</html>
